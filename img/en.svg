<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <circle cx="30" cy="30" r="30" fill="#012169"/>
  
  <!-- Diagonais brancas -->
  <polygon points="0,0 10,0 60,50 60,60 50,60 0,10" fill="#FFFFFF"/>
  <polygon points="60,0 50,0 0,50 0,60 10,60 60,10" fill="#FFFFFF"/>
  
  <!-- Diagonais vermelhas -->
  <polygon points="0,0 6,0 60,54 60,60 54,60 0,6" fill="#C8102E"/>
  <polygon points="60,0 54,0 0,54 0,60 6,60 60,6" fill="#C8102E"/>
  
  <!-- Cruz branca -->
  <rect x="0" y="25" width="60" height="10" fill="#FFFFFF"/>
  <rect x="25" y="0" width="10" height="60" fill="#FFFFFF"/>
  
  <!-- Cruz vermelha -->
  <rect x="0" y="27" width="60" height="6" fill="#C8102E"/>
