      document.addEventListener('DOMContentLoaded', function () {
        const themeBtn = document.getElementById('themeToggle');
        const langBtn = document.getElementById('langToggle');
        const langLabel = document.getElementById('langLabel');
        const langFlag = document.getElementById('langFlag');
        const backToTopBtn = document.getElementById('backToTop');
        const aboutText = document.getElementById('aboutText');
        const aboutToggle = document.getElementById('aboutToggle');
        const timelineList = document.getElementById('timelineList');
        const trajectoryToggle = document.getElementById('trajectoryToggle');
        const savedLang = localStorage.getItem('lang') || 'pt';
        let aboutExpanded = true;
        let trajectoryExpanded = false;

        function updateThemeIcon() {
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          themeBtn.textContent = isDark ? '☀️' : '🌙';
        }

        function renderTimeline(activeLang) {
          const container = document.getElementById('timelineList');
          container.innerHTML = '';
          timeline.forEach(function (item) {
            const el = document.createElement('article');
            el.className = 'timeline-item';
            const bullets = item.bullets[activeLang].map(function (b) {
              return '<li>' + b + '</li>';
            }).join('');
            el.innerHTML =
              '<div class="timeline-header">' +
                '<img class="timeline-logo" src="' + item.logo + '" alt="" />' +
                '<div class="timeline-heading">' +
                  '<h3>' + item.company + '</h3>' +
                  '<span class="timeline-role">' + item.role[activeLang] + '</span>' +
                '</div>' +
                '<span class="period">' + item.period[activeLang] + '</span>' +
              '</div>' +
              '<ul class="timeline-bullets">' + bullets + '</ul>';
            container.appendChild(el);
          });
        }

        function renderProjects(activeLang) {
          const container = document.getElementById('projectsList');
          container.innerHTML = '';
          projects.forEach(function (item) {
            const el = document.createElement('article');
            el.className = 'card project-item';
            const stackTags = item.stack.map(function (s) {
              return '<span class="stack-tag">' + s + '</span>';
            }).join('');
            el.innerHTML =
              '<div class="project-header">' +
                '<img class="project-logo" src="' + item.logo + '" alt="" />' +
                '<div>' +
                  '<h3>' + item.name + '</h3>' +
                  '<p class="role">' + item.role[activeLang] + '</p>' +
                  '<span class="period">' + item.since[activeLang] + '</span>' +
                '</div>' +
              '</div>' +
              '<p class="description">' + item.description[activeLang] + '</p>' +
              '<div class="project-stack">' + stackTags + '</div>';
            container.appendChild(el);
          });
        }

        function renderFormacao(activeLang) {
          const eduContainer = document.getElementById('educationList');
          eduContainer.innerHTML = '';
          education.forEach(function (item) {
            const el = document.createElement('article');
            el.className = 'card education-item';
            el.innerHTML =
              '<h3>' + item.degree[activeLang] + '</h3>' +
              '<p class="description">' + item.institution + ' · ' + item.year + '</p>';
            eduContainer.appendChild(el);
          });

          const certContainer = document.getElementById('certList');
          certContainer.innerHTML = '';
          certifications.forEach(function (item) {
            const el = document.createElement('li');
            el.className = 'cert-item';
            el.innerHTML =
              '<span class="cert-name">' + item.name[activeLang] + '</span>' +
              '<span class="cert-meta">' + item.institution + ' · ' + item.year + '</span>';
            certContainer.appendChild(el);
          });
        }

        function updateAboutToggle(dict) {
          aboutText.classList.toggle('is-collapsed', !aboutExpanded);
          aboutToggle.setAttribute('aria-expanded', String(aboutExpanded));
          aboutToggle.textContent = aboutExpanded ? dict.aboutCollapse : dict.aboutExpand;
        }

        function updateTrajectoryToggle(dict) {
          timelineList.classList.toggle('is-hidden', !trajectoryExpanded);
          trajectoryToggle.setAttribute('aria-expanded', String(trajectoryExpanded));
          trajectoryToggle.textContent = trajectoryExpanded ? dict.trajectoryHide : dict.trajectoryShow;
        }

        function applyLanguage(lang) {
          const activeLang = translations[lang] ? lang : 'pt';
          const dict = translations[activeLang];
          document.documentElement.lang = activeLang === 'pt' ? 'pt-BR' : 'en';

          document.querySelectorAll('[data-i18n]').forEach(function (el) {
            const key = el.getAttribute('data-i18n');
            if (dict[key]) el.textContent = dict[key];
          });

          renderTimeline(activeLang);
          renderProjects(activeLang);
          renderFormacao(activeLang);
          updateAboutToggle(dict);
          updateTrajectoryToggle(dict);

          themeBtn.setAttribute('aria-label', dict.themeAria);
          langBtn.setAttribute('aria-label', dict.langAria);
          backToTopBtn.setAttribute('aria-label', dict.topAria);
          backToTopBtn.setAttribute('title', dict.topAria);
          langLabel.textContent = activeLang.toUpperCase();
          langFlag.src = activeLang === 'pt' ? 'img/br.svg' : 'img/en.svg';
          langFlag.alt = activeLang === 'pt' ? 'Portuguese' : 'English';
          localStorage.setItem('lang', activeLang);
        }

        function toggleBackToTop() {
          if (window.scrollY > 280) {
            backToTopBtn.classList.add('show');
          } else {
            backToTopBtn.classList.remove('show');
          }
        }

        updateThemeIcon();
        applyLanguage(savedLang);

        themeBtn.addEventListener('click', function () {
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          const next = isDark ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          updateThemeIcon();
        });

        langBtn.addEventListener('click', function () {
          const current = localStorage.getItem('lang') || 'pt';
          const next = current === 'pt' ? 'en' : 'pt';
          applyLanguage(next);
        });

        aboutToggle.addEventListener('click', function () {
          aboutExpanded = !aboutExpanded;
          const activeLang = localStorage.getItem('lang') || 'pt';
          updateAboutToggle(translations[activeLang] || translations.pt);
        });

        trajectoryToggle.addEventListener('click', function () {
          trajectoryExpanded = !trajectoryExpanded;
          const activeLang = localStorage.getItem('lang') || 'pt';
          updateTrajectoryToggle(translations[activeLang] || translations.pt);
        });

        window.addEventListener('scroll', toggleBackToTop);
        backToTopBtn.addEventListener('click', function () {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        toggleBackToTop();

        const avatarImg = document.getElementById('avatarImg');
        const avatarOverlay = document.getElementById('avatarOverlay');

        function closeAvatarOverlay() {
          avatarOverlay.classList.remove('show');
        }

        avatarImg.addEventListener('click', function () {
          avatarOverlay.classList.add('show');
        });

        avatarOverlay.addEventListener('click', function (event) {
          if (event.target === avatarOverlay) {
            closeAvatarOverlay();
          }
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            closeAvatarOverlay();
          }
        });
      });
    })();
  </script>
